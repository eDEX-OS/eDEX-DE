# eDEX-DE — Bundled Hyprland Configuration
# Installed to /etc/xdg/edex-de/hyprland.conf
# DO NOT edit this file directly — it will be overwritten on upgrade.
# Place your personal overrides in: ~/.config/edex-de/hyprland-extra.conf

# ── Auto-start eDEX-DE shell ─────────────────────────────────────────────────
exec-once = edex-de
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP

# User overrides (sourced last so they can override anything above)
source = ~/.config/edex-de/hyprland-extra.conf

# ── Monitor ──────────────────────────────────────────────────────────────────
# Auto-detect all monitors; users can override in hyprland-extra.conf
monitor = ,preferred,auto,1

# ── eDEX-DE window rules ─────────────────────────────────────────────────────
# The eDEX-DE window is the persistent shell — always fullscreen, always present.
windowrulev2 = fullscreen, class:^(edex-de)$
windowrulev2 = pin,        class:^(edex-de)$
windowrulev2 = noborder,   class:^(edex-de)$
windowrulev2 = nodim,      class:^(edex-de)$
windowrulev2 = noshadow,   class:^(edex-de)$
windowrulev2 = nofullscreenrequest, class:^(edex-de)$

# ── Other app rules ──────────────────────────────────────────────────────────
# All non-eDEX apps open as floating windows on top of the eDEX shell.
windowrulev2 = float,   class:^(?!edex-de)(.*)$
windowrulev2 = center,  class:^(?!edex-de)(.*)$
windowrulev2 = size 1200 800, class:^(?!edex-de)(.*)$

# ── Keybindings ──────────────────────────────────────────────────────────────
# Super+Q — close the focused window, but NEVER close eDEX-DE
bind = SUPER, Q, exec, bash -c 'CLASS=$(hyprctl activewindow -j | jq -r ".class // empty"); [ "$CLASS" != "edex-de" ] && hyprctl dispatch closewindow address:$(hyprctl activewindow -j | jq -r ".address") || true'

# Super+Return — open a floating terminal
bind = SUPER, Return, exec, bash -c 'for t in foot kitty alacritty wezterm xterm; do command -v "$t" && exec "$t"; done'

# App launcher (Alt+Space is handled by the eDEX app itself via global shortcut)

# ── Input ────────────────────────────────────────────────────────────────────
input {
    kb_layout    = us
    kb_variant   =
    kb_model     =
    kb_options   =
    follow_mouse = 1

    touchpad {
        natural_scroll   = true
        disable_while_typing = true
    }

    sensitivity = 0
}

# ── General ──────────────────────────────────────────────────────────────────
general {
    gaps_in      = 4
    gaps_out     = 8
    border_size  = 2
    col.active_border   = rgba(00ff9955)
    col.inactive_border = rgba(44444455)
    layout       = dwindle
}

# ── Decoration ───────────────────────────────────────────────────────────────
decoration {
    rounding    = 8
    blur {
        enabled = true
        size    = 6
        passes  = 2
    }
    shadow {
        enabled = true
        range   = 8
        color   = rgba(00000088)
    }
}

# ── Animations ───────────────────────────────────────────────────────────────
animations {
    enabled = true
    bezier  = edex, 0.05, 0.9, 0.1, 1.0
    animation = windows,     1, 4, edex
    animation = windowsOut,  1, 4, edex, popin 80%
    animation = fade,        1, 4, edex
    animation = workspaces,  1, 5, edex
}

# ── Miscellaneous ─────────────────────────────────────────────────────────────
misc {
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    force_default_wallpaper  = 0
    # Ensure eDEX-DE is always in the foreground focus on startup
    focus_on_activate        = true
}

# ── Dwindle layout ───────────────────────────────────────────────────────────
dwindle {
    pseudotile  = true
    preserve_split = true
}
