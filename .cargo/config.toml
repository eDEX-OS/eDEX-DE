# On Arch Linux, the Rust toolchain uses a -B<sysroot>/gcc-ld wrapper that
# invokes lld by default. The ring crate's assembly fails to link with lld
# unless nasm is also installed (nasm is in makedepends for the AUR package).
#
# Setting linker = "cc" bypasses the -B wrapper entirely so that the system
# gcc/cc is called directly. Coupling with -fuse-ld=bfd ensures bfd is used
# as the actual linker, which is fully compatible with ring's assembly objects.
[target.x86_64-unknown-linux-gnu]
linker = "cc"
rustflags = ["-C", "link-arg=-fuse-ld=bfd"]
