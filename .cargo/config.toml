# On Arch Linux, the Rust toolchain uses a -B<sysroot>/gcc-ld wrapper that
# invokes lld by default. Setting linker = "cc" bypasses the -B wrapper so
# that the system gcc/cc is called directly, avoiding linker compatibility
# issues with certain crates on Arch.
[target.x86_64-unknown-linux-gnu]
linker = "cc"
