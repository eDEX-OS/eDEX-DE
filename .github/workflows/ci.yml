name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Ubuntu/Debian)
        run: |
          sudo apt-get update
          # Required: core build tools
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            patchelf \
            librsvg2-dev
          # Required: WebKit (4.1 for newer distros, 4.0 fallback)
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y libwebkit2gtk-4.0-dev
          # Required: GTK3
          sudo apt-get install -y libgtk-3-dev libglib2.0-dev
          # Required: audio (rodio/alsa-sys)
          sudo apt-get install -y libasound2-dev
          # Optional (may not exist on all Ubuntu versions)
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev \
            at-spi2-core || true
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build frontend
        run: npm run build

      - name: Tauri build (no bundle)
        run: npm run tauri -- build --no-bundle
