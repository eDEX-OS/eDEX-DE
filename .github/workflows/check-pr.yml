name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  CARGO_TERM_COLOR: always

jobs:
  quick-check:
    name: Quick Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev patchelf librsvg2-dev
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y libwebkit2gtk-4.0-dev
          sudo apt-get install -y libgtk-3-dev libglib2.0-dev
          sudo apt-get install -y libasound2-dev
          sudo apt-get install -y \
            libayatana-appindicator3-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev libxdo-dev at-spi2-core || true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm deps
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml
