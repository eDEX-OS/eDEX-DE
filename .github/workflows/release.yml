name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build Linux packages
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            libglib2.0-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev \
            at-spi2-core \
            || true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm install

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Tauri packages (deb + rpm + appimage)
        run: npm run tauri -- build --bundles deb,rpm,appimage
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: List build artifacts
        run: find src-tauri/target/release/bundle -type f | sort

      - name: Collect artifacts
        id: artifacts
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          BUNDLE_DIR="src-tauri/target/release/bundle"

          DEB=$(find "$BUNDLE_DIR/deb" -name "*.deb" 2>/dev/null | head -1)
          RPM=$(find "$BUNDLE_DIR/rpm" -name "*.rpm" 2>/dev/null | head -1)
          APPIMAGE=$(find "$BUNDLE_DIR/appimage" -name "*.AppImage" 2>/dev/null | head -1)

          if [ -n "$DEB" ]; then
            cp "$DEB" "edex-de_${VERSION}_amd64.deb"
            echo "DEB=edex-de_${VERSION}_amd64.deb" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$RPM" ]; then
            cp "$RPM" "edex-de-${VERSION}-1.x86_64.rpm"
            echo "RPM=edex-de-${VERSION}-1.x86_64.rpm" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$APPIMAGE" ]; then
            cp "$APPIMAGE" "eDEX-DE_${VERSION}_amd64.AppImage"
            echo "APPIMAGE=eDEX-DE_${VERSION}_amd64.AppImage" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifacts to workflow
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            *.deb
            *.rpm
            *.AppImage
          if-no-files-found: warn

  create-release:
    name: Create GitHub Release
    needs: build-linux
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-packages
          path: artifacts/

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Extract version and changelog
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${VERSION}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --oneline "${PREV_TAG}..HEAD" --no-merges | head -30)
          else
            CHANGES=$(git log --oneline -20 --no-merges)
          fi
          echo "PREV_TAG=$PREV_TAG" >> "$GITHUB_OUTPUT"
          cat > CHANGELOG_BODY.md << 'HEREDOC'
          ## What's Changed
          HEREDOC
          echo "$CHANGES" | sed 's/^/- /' >> CHANGELOG_BODY.md
          cat >> CHANGELOG_BODY.md << 'HEREDOC'

          ## Installation

          ### Debian / Ubuntu
          ```bash
          sudo apt install ./edex-de_VERSION_amd64.deb
          ```

          ### Fedora / RHEL
          ```bash
          sudo dnf install ./edex-de-VERSION-1.x86_64.rpm
          ```

          ### Arch Linux
          ```bash
          # Use the PKGBUILD in packaging/ or wait for AUR submission
          yay -S edex-de
          ```

          ### AppImage (any distro)
          ```bash
          chmod +x eDEX-DE_VERSION_amd64.AppImage
          ./eDEX-DE_VERSION_amd64.AppImage
          ```

          ## Runtime Requirements
          - Hyprland compositor
          - `libwebkit2gtk-4.1` or `libwebkit2gtk-4.0`
          - Optional: `pipewire-pulse`, `network-manager`, `fprintd`
          HEREDOC
          sed -i "s/VERSION/${VERSION#v}/g" CHANGELOG_BODY.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "eDEX-DE ${{ steps.meta.outputs.VERSION }}"
          body_path: CHANGELOG_BODY.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
